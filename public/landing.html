<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Davarnet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css" />
</head>
<body>

<div class="bg-orbs">
  <span class="orb orb1"></span>
  <span class="orb orb2"></span>
  <span class="orb orb3"></span>
</div>

<div class="landing">
  <div class="landing-hero">
    <div class="brand-logo big">D</div>
    <h1 class="landing-title">Davarnet</h1>
    <p class="landing-subtitle">دسترسی امن، سریع و شخصی‌سازی‌شده به اینترنت آزاد</p>
    <a href="/panel" class="btn primary big">ورود به پنل</a>
  </div>

  <div class="features">
    <div class="glass-card feature-card">
      <div class="feature-icon">⚡</div>
      <h3>سریع و پایدار</h3>
      <p>زیرساخت بهینه‌شده برای کمترین تأخیر و بیشترین پایداری اتصال.</p>
    </div>
    <div class="glass-card feature-card">
      <div class="feature-icon">🔒</div>
      <h3>خصوصی و امن</h3>
      <p>هر کاربر کانفیگ اختصاصی خودش رو داره، جدا از بقیه.</p>
    </div>
    <div class="glass-card feature-card">
      <div class="feature-icon">📱</div>
      <h3>مدیریت آسان</h3>
      <p>ساخت، حذف و مشاهده مصرف کانفیگ‌ها فقط با چند کلیک.</p>
    </div>
  </div>

  <footer class="landing-footer">Davarnet</footer>
</div>

</body>
</html>
