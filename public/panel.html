<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Davarnet - پنل</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<link rel="stylesheet" href="/style.css" />
</head>
<body>

<div class="bg-orbs">
  <span class="orb orb1"></span>
  <span class="orb orb2"></span>
  <span class="orb orb3"></span>
</div>

<div id="toast-container"></div>

<!-- LOGIN VIEW -->
<div id="loginView" class="screen center">
  <form id="loginForm" class="glass-card login-card">
    <div class="brand">
      <div class="brand-logo">D</div>
      <h1>Davarnet</h1>
    </div>
    <p class="subtitle">به پنل داورنت خوش اومدی</p>
    <div class="field">
      <label>نام کاربری</label>
      <input type="text" id="loginUsername" autocomplete="username" required />
    </div>
    <div class="field">
      <label>رمز عبور</label>
      <input type="password" id="loginPassword" autocomplete="current-password" required />
    </div>
    <button type="submit" class="btn primary full">ورود</button>
    <p id="loginError" class="error-text"></p>
    <a href="/" class="back-link">← بازگشت به صفحه اصلی</a>
  </form>
</div>

<!-- APP VIEW -->
<div id="appView" class="screen hidden">
  <header class="topbar">
    <a href="/" class="brand small">
      <div class="brand-logo">D</div>
      <span>Davarnet</span>
    </a>
    <div class="topbar-right">
      <span id="whoami" class="who"></span>
      <button id="logoutBtn" class="btn ghost">خروج</button>
    </div>
  </header>

  <main class="container">
    <nav id="tabs" class="tabs hidden">
      <button class="tab-btn active" data-tab="clients">کانفیگ‌های من</button>
      <button class="tab-btn" data-tab="users">مدیریت کاربران</button>
    </nav>

    <section id="clientsTab" class="tab-panel">
      <div class="glass-card add-card">
        <h3>ساخت کانفیگ جدید</h3>
        <div class="add-row">
          <input type="text" id="newClientName" placeholder="اسم کانفیگ (مثلاً گوشی من)" />
          <input type="text" id="newClientNote" placeholder="توضیحات (اختیاری)" />
          <input type="number" id="newClientExpiry" placeholder="انقضا (روز، خالی = نامحدود)" min="1" />
          <button class="btn primary" id="addClientBtn">
            <span class="btn-label">افزودن</span>
          </button>
        </div>
        <p id="limitInfo" class="muted-note"></p>
      </div>

      <div id="clientsList" class="clients-grid"></div>
    </section>

    <section id="usersTab" class="tab-panel hidden">
      <div class="glass-card add-card">
        <h3>ساخت کاربر جدید</h3>
        <div class="add-row">
          <input type="text" id="newUserName" placeholder="نام کاربری" />
          <input type="text" id="newUserPass" placeholder="رمز عبور" />
          <button class="btn primary" id="addUserBtn">
            <span class="btn-label">افزودن کاربر</span>
          </button>
        </div>
      </div>
      <div id="usersList" class="clients-grid"></div>
    </section>
  </main>
</div>

<!-- QR MODAL -->
<div id="qrModal" class="modal-overlay hidden">
  <div class="modal glass-card">
    <button class="modal-close" id="qrModalClose">×</button>
    <h3 id="qrModalTitle"></h3>
    <div id="qrModalBody"></div>
  </div>
</div>

<script src="/app.js"></script>
</body>
</html>
